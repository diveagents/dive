Name: Current Time
Description: Show the current time

Workflows:
  - Name: Show Current Time
    Steps:
      - Name: Get Current Time
        Action: Time.Now
        Store: current_time

      - Name: Print Current Time
        Action: Print
        Parameters:
          Message: |
            The current time is ${current_time}

      - Name: Hello
        Prompt: |
          Say hello to the user.
