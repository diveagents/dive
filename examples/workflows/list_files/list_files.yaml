name: 'File Explorer'
description: 'List files in a directory'

config:
  llm:
    default_provider: 'anthropic'
    default_model: 'claude-3-7-sonnet-20250219'
  logging:
    level: 'info'

tools:
  google_search:
    enabled: true
  firecrawl_scrape:
    enabled: true
  directory_list:
    enabled: true
  file_read:
    enabled: true

agents:
  engineer:
    description: 'Principal Software Engineer'
    tools:
      - google_search
      - firecrawl_scrape
      - directory_list
      - file_read

documents:
  file_list:
    description: 'List of files in a directory'
    path: './output/file_list.txt'
  summary:
    description: 'Summary of the results'
    path: './output/summary.txt'

tasks:
  list_files:
    description: 'List all files in the directory: ${inputs.directory}'
    agent: engineer
    inputs:
      directory:
        type: string
        description: 'The directory to list files in'
  search:
    description: 'Search the web for ${inputs.query}'
    agent: engineer
    inputs:
      query:
        type: string
        description: 'The query to search the web for'
  summary:
    description: 'Summarize the results'
    agent: engineer
    inputs:
      results:
        type: string
        description: 'The results to summarize'

workflows:
  list_files:
    description: 'List all files in a directory'
    steps:
      - name: 'List Files Here'
        task: list_files
        each:
          items: ['./workflow', './retry']
          as: 'directory'
        output:
          document: file_list
      - name: 'Summary'
        task: summary
        with:
          results: $(documents.get("./output/file_list.txt").content)
        output:
          document: summary
