Name: Simple MCP Demo
Description: A basic demonstration of MCP integration in Dive workflows

Config:
  DefaultProvider: anthropic
  LogLevel: debug
  ConfirmationMode: if-destructive
  Providers:
    - Name: anthropic
      MCPServers:
        - Type: stdio
          Name: git-server
          URL: 'uvx'
          Env:
            DEBUG: 'true'
            GIT_CONFIG_GLOBAL: '/tmp/gitconfig'
          Args:
            - 'mcp-server-git'
            - '--verbose'
          ToolConfiguration:
            Enabled: true
        # - Type: stdio
        #   Name: filesystem-server
        #   URL: 'python'
        #   Env:
        #     PYTHONPATH: '/usr/local/lib/python3.9/site-packages'
        #     MCP_LOG_LEVEL: 'debug'
        #   Args:
        #     - '-m'
        #     - 'mcp_server_filesystem'
        #     - '--root-dir'
        #     - '.'
        #   ToolConfiguration:
        #     Enabled: true
        #     AllowedTools:
        #       - 'read_file'
        #       - 'list_directory'

Tools:
  - Name: Web.Search
  # - Name: git_status
  # - Name: git_diff
  # - Name: git_show
  # - Name: git_log

Agents:
  - Name: MCP Explorer
    Goal: Demonstrate MCP tool usage
    Instructions: |
      You are an AI assistant that demonstrates how to use MCP (Model Context Protocol) tools
      within Dive workflows. You have access to various MCP tools that allow you to interact
      with external systems and services.

      When using MCP tools:
      1. Explain what tool you're using and why
      2. Show the input parameters clearly
      3. Interpret and summarize the results
      4. Suggest follow-up actions if appropriate

    Tools:
      - Web.Search
      - git-server.git_status
      - git-server.git_diff
      # - Git.ListRepos  # Temporarily commenting out until we discover the correct tool name

Workflows:
  - Name: MCP Tool Discovery
    Description: Discover and test available MCP tools
    Inputs:
      - Name: test_type
        Type: string
        Description: Type of MCP test to run (discovery, filesystem, web-service)
        Default: 'discovery'

    Steps:
      - Name: Discover MCP Tools
        Agent: MCP Explorer
        Prompt: |
          Hello! I'm going to help you explore MCP (Model Context Protocol) tools that are 
          available in this Dive environment.

          Test type: ${inputs.test_type}

          First, let me discover what MCP tools are available by using any MCP tools that
          might be connected. If you have MCP servers configured, I should have access to
          their tools automatically.

          Please:
          1. List any MCP tools that are available to me
          2. Try calling a simple MCP tool to test the connection
          3. Explain what each tool does
          4. Show an example of how to use the tools

          If no MCP tools are available, explain what would be needed to set them up.
        Store: tool_discovery

