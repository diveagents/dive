name: 'File Explorer'
description: 'List files in a directory'

config:
  default_provider: 'anthropic'
  default_model: 'claude-3-7-sonnet-20250219'
  log_level: 'info'

tools:
  google_search:
    enabled: true
  firecrawl_scrape:
    enabled: true
  directory_list:
    enabled: true
  file_read:
    enabled: true

agents:
  engineer:
    description: 'Principal Software Engineer'
    tools:
      - google_search
      - firecrawl_scrape
      - directory_list
      - file_read

tasks:
  list-files:
    description: 'List all files in the directory: ${inputs.directory}'
    agent: engineer
    inputs:
      directory:
        type: string
        description: 'The directory to list files in'
  search:
    description: 'Search the web for ${inputs.query}'
    agent: engineer
    inputs:
      query:
        type: string
        description: 'The query to search the web for'

workflows:
  list-files:
    description: 'List all files in a directory'
    inputs:
      directory:
        type: string
        description: 'The directory to list files in'
        default: '.'
    steps:
      - name: 'List Files Here'
        task: list-files
        each:
          array: ['.', 'examples']
          as: 'directory'
        next:
          - step: 'List Files in Home'
        with:
          directory: '.'
      - name: 'List Files in Home'
        task: list-files
        with:
          directory: '~'
      - name: 'Search Web'
        task: search
        with:
          query: 'What is the capital of France?'
